name: "Multi Source Node Modules Cache"
description: "Restore/save node_modules from internal S3, GitHub cache, or install."
inputs:
  netbird-connected:
    required: false
    default: ""
  s3-host-netbird:
    required: false
    default: ""
  s3-host-public:
    required: false
    default: ""
  s3-access-key:
    required: true
  s3-secret-key:
    required: true
  s3-bucket:
    required: true
  s3-region:
    required: false
    default: ""
  cache-key:
    required: true
  cache-restore-keys:
    required: false
    default: ""
  cache-path:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: feat/cache-fallback
        repository: pi-xcels/action-cache-fallback
        path: .github/actions/cache-fallback

    - name: Lookup caches
      id: lookup
      uses: ./.github/actions/cache-fallback/.github/actions/lookup
      with:
        netbird-connected: ${{ inputs.netbird-connected }}
        s3-host-netbird: ${{ inputs.s3-host-netbird }}
        s3-host-public: ${{ inputs.s3-host-public }}
        s3-access-key: ${{ inputs.s3-access-key }}
        s3-secret-key: ${{ inputs.s3-secret-key }}
        s3-bucket: ${{ inputs.s3-bucket }}
        s3-region: ${{ inputs.s3-region }}
        cache-key: ${{ inputs.cache-key }}
        cache-restore-keys: ${{ inputs.cache-restore-keys }}
        cache-path: ${{ inputs.cache-path }}

    - name: Restore caches
      uses: ./.github/actions/cache-fallback/.github/actions/restore
      with:
        netbird-connected: ${{ inputs.netbird-connected }}
        s3-host-netbird: ${{ inputs.s3-host-netbird }}
        s3-host-public: ${{ inputs.s3-host-public }}
        s3-access-key: ${{ inputs.s3-access-key }}
        s3-secret-key: ${{ inputs.s3-secret-key }}
        s3-bucket: ${{ inputs.s3-bucket }}
        s3-region: ${{ inputs.s3-region }}
        cache-key: ${{ inputs.cache-key }}
        cache-restore-keys: ${{ inputs.cache-restore-keys }}
        cache-path: ${{ inputs.cache-path }}
        internal-hit: ${{ steps.lookup.outputs.internal-hit }}
        external-hit: ${{ steps.lookup.outputs.external-hit }}

    - name: Save caches
      uses: ./.github/actions/cache-fallback/.github/actions/save
      with:
        netbird-connected: ${{ inputs.netbird-connected }}
        s3-host-netbird: ${{ inputs.s3-host-netbird }}
        s3-host-public: ${{ inputs.s3-host-public }}
        s3-access-key: ${{ inputs.s3-access-key }}
        s3-secret-key: ${{ inputs.s3-secret-key }}
        s3-bucket: ${{ inputs.s3-bucket }}
        s3-region: ${{ inputs.s3-region }}
        cache-key: ${{ inputs.cache-key }}
        cache-path: ${{ inputs.cache-path }}
        internal-hit: ${{ steps.lookup.outputs.internal-hit }}
        external-hit: ${{ steps.lookup.outputs.external-hit }}
